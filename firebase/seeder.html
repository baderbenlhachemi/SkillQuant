        const USA_COMPANIES     = ["Google", "Microsoft", "Amazon", "Meta", "Apple", "Netflix", "Stripe", "Uber", "Airbnb", "Datadog"];

        function getEmployersForSkill(skillId, country) {
            if (EMPLOYERS[country] && EMPLOYERS[country][skillId]) return EMPLOYERS[country][skillId];
            // Pick 5 pseudo-random companies based on skillId hash
            const pool = country === "Morocco" ? MOROCCO_COMPANIES : country === "France" ? FRANCE_COMPANIES : USA_COMPANIES;
            let hash = 0;
            for (let i = 0; i < skillId.length; i++) hash = ((hash << 5) - hash + skillId.charCodeAt(i)) | 0;
            const start = Math.abs(hash) % pool.length;
            const result = [];
            for (let i = 0; i < 5; i++) result.push(pool[(start + i) % pool.length]);
            return result;
        }

        // ===== SCRAPE REAL JOBS FROM REMOTIVE =====
        let remotiveJobsCache = null;

        async function fetchRemotiveJobs() {
            if (remotiveJobsCache) return remotiveJobsCache;
            log('🌐 Fetching real jobs from Remotive API...');
            try {
                const res = await fetch('https://remotive.com/api/remote-jobs?limit=300');
                const data = await res.json();
                remotiveJobsCache = data.jobs || [];
                log(`✅ Fetched ${remotiveJobsCache.length} real jobs from Remotive`, 'success');
                return remotiveJobsCache;
            } catch (e) {
                log(`⚠️ Remotive API failed: ${e.message}, using fallback`, 'warning');
                return [];
            }
        }

        function matchJobsForSkill(allJobs, skill) {
            const terms = skill.searchTerms.map(t => t.toLowerCase());
            return allJobs.filter(job => {
                const text = `${job.title || ''} ${(job.tags || []).join(' ')} ${job.description || ''}`.toLowerCase();
                return terms.some(term => text.includes(term));
            });
        }

        function daysSincePosted(dateStr) {
            if (!dateStr) return 7;
            const posted = new Date(dateStr).getTime();
            return Math.max(0, Math.floor((Date.now() - posted) / 86400000));
        }

        async function getJobListingsForSkill(skill, country) {
            const LINKEDIN_GEO = { Morocco: "102787409", France: "105015875", USA: "103644278" };
            const INDEED_DOMAIN = { Morocco: "ma.indeed.com", France: "fr.indeed.com", USA: "www.indeed.com" };
            const cities = CITIES[country];
            const employers = getEmployersForSkill(skill.id, country);
            const mult = SALARY_MULT[country];
            const cur = CURRENCIES[country];

            // 6 country-specific local jobs with LinkedIn/Indeed links
            const localTemplates = [
                { title: `Senior ${skill.name} Engineer`,       type: "Full-time" },
                { title: `${skill.name} Developer`,             type: "Full-time" },
                { title: `${skill.name} Team Lead`,             type: "Full-time" },
                { title: `Junior ${skill.name} Developer`,      type: "Full-time" },
                { title: `${skill.name} Consultant`,            type: "Contract"  },
                { title: `${skill.name} Full-Stack Developer`,  type: "Full-time" },
            ];

            const localJobs = localTemplates.map((t, i) => {
                const city = cities[i % cities.length];
                const company = employers[i % employers.length];
                const seniorityMult = i === 0 ? 1.3 : i === 2 ? 1.35 : i === 3 ? 0.6 : 1.0;
                const base = Math.floor((70000 + Math.random() * 90000) * mult * seniorityMult);
                const hi = Math.floor(base * 1.25);
                const source = i % 2 === 0 ? "LinkedIn" : "Indeed";
                const searchQuery = `${t.title} ${company}`;
                const url = source === "LinkedIn"
                    ? `https://www.linkedin.com/jobs/search/?keywords=${encodeURIComponent(searchQuery)}&location=${encodeURIComponent(city + ', ' + country)}&geoId=${LINKEDIN_GEO[country]}&f_TPR=r604800`
                    : `https://${INDEED_DOMAIN[country]}/jobs?q=${encodeURIComponent(searchQuery)}&l=${encodeURIComponent(city)}&fromage=7`;

                return {
                    title: t.title,
                    company,
                    location: `${city}, ${country}`,
                    salaryRange: `${cur} ${(base/1000).toFixed(0)}k–${(hi/1000).toFixed(0)}k`,
                    type: t.type,
                    url,
                    source,
                    postedDaysAgo: Math.floor(Math.random() * 5),
                };
            });

            // 2 Remotive remote jobs (rotated per country so each country gets different ones)
            const allJobs = await fetchRemotiveJobs();
            const matched = matchJobsForSkill(allJobs, skill);
            const countryIndex = COUNTRIES.indexOf(country);
            const offset = countryIndex * 2;
            const remoteSlice = matched.slice(offset, offset + 2);

            const remoteJobs = remoteSlice.map(job => ({
                title: job.title || '',
                company: job.company_name || '',
                location: (job.candidate_required_location || 'Remote'),
                salaryRange: job.salary || 'Not specified',
                type: job.job_type === 'contract' ? 'Contract' : 'Full-time',
                url: job.url || '',
                source: 'Remotive',
                postedDaysAgo: daysSincePosted(job.publication_date),
            }));

            return [...localJobs, ...remoteJobs];
        }

        // Arbitrage skills (per country) — top 15 unique from diverse categories
        const ARB_SKILL_INDICES = [0, 3, 4, 5, 6, 14, 17, 21, 34, 42, 49, 80, 85, 90, 95].map(i => Math.min(i, SKILLS.length - 1));
        // Trending skills (per country) — 15 unique, no overlap
        const TREND_SKILL_INDICES = [1, 2, 7, 8, 9, 15, 20, 30, 40, 50, 60, 70, 75, 82, 88].map(i => Math.min(i, SKILLS.length - 1));

        async function seedSkills() {
            log('📚 Seeding skills collection...');
            let batch = writeBatch(db);
            let count = 0;
            for (const s of SKILLS) {
                batch.set(doc(db, 'skills', s.id), { name: s.name, category: s.category, tags: s.searchTerms || [] });
                count++;
                if (count >= 450) {
                    await batch.commit();
                    batch = writeBatch(db);
                    count = 0;
                }
            }
            if (count > 0) await batch.commit();
            log(`✅ Seeded ${SKILLS.length} skills`, 'success');
        }

        async function seedSkillMetrics() {
            log('📊 Seeding skill metrics with REAL job listings and learning resources...');
            const now = Date.now();
            const DAY_MS = 86400000;

            // Pre-fetch all Remotive jobs once
            await fetchRemotiveJobs();

            let total = 0;
            let realJobCount = 0;

            for (const country of COUNTRIES) {
                log(`  🌍 Processing ${country}...`);
                const mult = SALARY_MULT[country];
                let batch = writeBatch(db);
                let batchCount = 0;

                for (const s of SKILLS) {
                    const demand = 45 + Math.random() * 50;
                    const supply = 15 + Math.random() * 55;
                    const baseSalary = 80000 + Math.floor(Math.random() * 100000);
                    const salary = Math.floor(baseSalary * mult);

                    // 90-day trend data
                    const demandTrend = [], salaryTrend = [];
                    let dB = demand - 10, sB = salary - 5000;
                    for (let d = 89; d >= 0; d--) {
                        dB += (Math.random() - 0.45) * 2;
                        dB = Math.max(5, Math.min(98, dB));
                        sB += (Math.random() - 0.45) * 800 * mult;
                        sB = Math.max(10000, sB);
                        demandTrend.push({ timestamp: now - d * DAY_MS, value: Math.round(dB * 100) / 100 });
                        salaryTrend.push({ timestamp: now - d * DAY_MS, value: Math.round(sB) });
                    }

                    const employers = getEmployersForSkill(s.id, country);
                    const jobListings = await getJobListingsForSkill(s, country);
                    realJobCount += jobListings.filter(j => j.source === 'Remotive').length;

                    const docId = `${s.id}_${country.toLowerCase()}`;
                    batch.set(doc(db, 'skillMetrics', docId), {
                        skillId: s.id, skillName: s.name, category: s.category, location: country,
                        demandScore: Math.round(demand * 10) / 10,
                        supplyScore: Math.round(supply * 10) / 10,
                        arbitrageScore: Math.round((demand * 0.6 + (100 - supply) * 0.3) * 10) / 10,
                        avgSalary: salary,
                        medianSalary: Math.floor(salary * 0.92),
                        freelanceHourlyRate: Math.floor((80000 + Math.random() * 100000) / 1800),
                        jobPostCount: 50 + Math.floor(Math.random() * 500),
                        freelanceGigCount: 10 + Math.floor(Math.random() * 150),
                        demandTrend, salaryTrend,
                        topEmployers: employers,
                        jobListings,
                        learningResources: getResourcesForSkill(s.id, s.name),
                        updatedAt: now,
                    });
                    total++;
                    batchCount++;
                    if (batchCount >= 400) {
                        await batch.commit();
                        batch = writeBatch(db);
                        batchCount = 0;
                    }
                }
                if (batchCount > 0) await batch.commit();
                log(`  ✅ ${country}: ${SKILLS.length} skills seeded`, 'success');
            }
            log(`✅ Seeded ${total} skill metrics — ${realJobCount} real jobs from Remotive + local board links`, 'success');
        }

        async function seedArbitrageOpportunities() {
            log('🎯 Seeding arbitrage opportunities (per country)...');
            const batch = writeBatch(db);
            const now = Date.now();
            let total = 0;
            for (const country of COUNTRIES) {
                const mult = SALARY_MULT[country];
                for (const idx of ARB_SKILL_INDICES) {
                    const s = SKILLS[idx];
                    const demand = 70 + Math.random() * 25;
                    const supply = 15 + Math.random() * 35;
                    const arb = demand * 0.6 + (100 - supply) * 0.3 + Math.random() * 5;
                    const salary = Math.floor((80000 + Math.random() * 100000) * mult);
                    const change = 5 + Math.round(Math.random() * 200) / 10;
                    batch.set(doc(collection(db, 'arbitrageOpportunities')), {
                        skillId: s.id, skillName: s.name, location: country,
                        arbitrageScore: Math.round(arb * 10) / 10,
                        demandScore: Math.round(demand * 10) / 10,
                        supplyScore: Math.round(supply * 10) / 10,
                        avgSalary: salary,
                        changePercent: change, direction: "up",
                        summary: `${s.name} engineers in ${country} earn ${(1.3 + Math.random()).toFixed(1)}x more this quarter.`,
                        updatedAt: now,
                    });
                    total++;
                }
            }
            await batch.commit();
            log(`✅ Seeded ${total} arbitrage opportunities`, 'success');
        }

        async function seedTrendingSkills() {
            log('📈 Seeding trending skills (per country)...');
            const batch = writeBatch(db);
            const now = Date.now();
            let total = 0;
            for (const country of COUNTRIES) {
                for (const idx of TREND_SKILL_INDICES) {
                    const s = SKILLS[idx];
                    const change = 5 + Math.round(Math.random() * 250) / 10;
                    batch.set(doc(collection(db, 'trendingSkills')), {
                        skillId: s.id, skillName: s.name, location: country,
                        trendDirection: Math.random() > 0.15 ? "up" : "down",
                        changePercent: change, period: "7d",
                        updatedAt: now,
                    });
                    total++;
                }
            }
            await batch.commit();
            log(`✅ Seeded ${total} trending skills`, 'success');
        }

        async function clearCollection(name) {
            log(`  🗑️ Clearing '${name}'...`);
            let totalDeleted = 0;
            // Delete in small loops to avoid transaction size limits
            while (true) {
                const snap = await getDocs(collection(db, name));
                if (snap.empty) break;
                // Delete up to 100 at a time using individual deleteDoc (safer than batches for large docs)
                const chunk = snap.docs.slice(0, 100);
                const promises = chunk.map(d => deleteDoc(d.ref));
                await Promise.all(promises);
                totalDeleted += chunk.length;
                log(`    Deleted ${totalDeleted} so far from '${name}'...`);
            }
            if (totalDeleted > 0) {
                log(`🗑️ Cleared ${totalDeleted} docs from '${name}'`, 'warning');
            } else {
                log(`🗑️ Collection '${name}' is already empty`);
            }
        }

        window.clearAndReseed = async function() {
            if (!confirm('This will DELETE all existing data and reseed. Continue?')) return;
            const btn = document.getElementById('clearBtn');
            btn.disabled = true;
            try {
                log('🔐 Signing in anonymously...');
                await signInAnonymously(auth);
                log('✅ Authenticated', 'success');
                log('\n🗑️ Clearing old data...');
                await clearCollection('skillMetrics');
                await clearCollection('arbitrageOpportunities');
                await clearCollection('trendingSkills');
                await clearCollection('skills');
                log('✅ Old data cleared\n');
                await doSeed();
            } catch (error) {
                log(`\n❌ Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        };

        window.seedAll = async function() {
            const btn = document.getElementById('seedBtn');
            btn.disabled = true;
            try {
                log('🔐 Signing in anonymously...');
                await signInAnonymously(auth);
                log('✅ Authenticated', 'success');
                await doSeed();
            } catch (error) {
                log(`\n❌ Error: ${error.message}`, 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        };

        async function doSeed() {
            await seedSkills();
            await seedSkillMetrics();
            await seedArbitrageOpportunities();
            await seedTrendingSkills();
            log('\n🎉 All data seeded successfully!', 'success');
            log('✅ Your Android app is ready to run!', 'success');
        }

        window.clearLogs = function() {
            document.getElementById('status').innerHTML = '';
        };

        log('✅ Seeder ready. Click "Seed All Collections" to start.');
    </script>
</body>
